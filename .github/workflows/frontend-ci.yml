name: Frontend CI

on:
  push:
    branches: ['main', 'develop']
  pull_request:
    branches: ['main']

jobs:
  frontend:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_URL: http://fake-api

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Testes
        run: npm run test --if-present

      - name: Build Next.js
        run: npm run build
