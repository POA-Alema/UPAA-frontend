name: Frontend CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  frontend:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_URL: http://fake-api

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Testes
        run: npm run test --if-present

      - name: Build Next.js
        run: npm run build

  mirror:
    runs-on: ubuntu-latest
    needs: frontend
    if: github.event_name == 'push'

    steps:
      - name: Checkout completo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Push para GitLab
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@tools.ages.pucrs.br/uma-porto-alegre-alem/frontend.git
          CURRENT_BRANCH=${GITHUB_REF#refs/heads/}
          git push gitlab $CURRENT_BRANCH --force
          git push gitlab --tags --force
